name: .NET Deploy to Elastic Beanstalk

on:
  push:
    branches: [ "master" ]

env:
  PROJECT_LOCATION: ComicStoreASP/ComicStoreASP/ComicStoreASP.csproj
  ELASTIC_BEANSTALK_NAME: comicstore-app-Git
  ELASTIC_BEANSTALK_ENV_NAME: comicstore-git-env
  AWS_REGION: eu-west-2

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore ${{ env.PROJECT_LOCATION }}

    - name: Build
      run: dotnet build ${{ env.PROJECT_LOCATION }} --no-restore

    - name: Publish
      run: |
        dotnet publish ${{ env.PROJECT_LOCATION }} -c Release -o publish

    - name: Zip package
      run: |
        cd publish
        zip -r ../app.zip .

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: deploy-package
        path: app.zip

  deploy:
      runs-on: ubuntu-latest
      needs: build

      env:
        AWS_REGION: eu-west-2
        S3_BUCKET: elasticbeanstalk-eu-west-2-${{ secrets.AWS_ACCOUNT_ID }}
        S3_KEY: artifact/comicstore/${{ github.run_id }}.zip

      steps:
      - uses: actions/download-artifact@v4
        with:
          name: deploy-package

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Upload to S3
        run: |
          aws s3 cp app.zip s3://${{ env.S3_BUCKET }}/${{ env.S3_KEY }}

      - name: Create Elastic Beanstalk Version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name ${{ env.ELASTIC_BEANSTALK_NAME }} \
            --version-label ${{ github.run_id }} \
            --source-bundle S3Bucket=${{ env.S3_BUCKET }},S3Key=${{ env.S3_KEY }}

      - name: Deploy to Elastic Beanstalk
        run: |
          aws elasticbeanstalk update-environment \
            --environment-name ${{ env.ELASTIC_BEANSTALK_ENV_NAME }} \
            --version-label ${{ github.run_id }}

      - name: Wait for deployment
        run: |
          aws elasticbeanstalk wait environment-updated \
            --environment-name ${{ env.ELASTIC_BEANSTALK_ENV_NAME }}

